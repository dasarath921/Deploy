<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium UI</title>

<style>
/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* Background */
body {
    height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass Card */
.container {
    width: 350px;
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255, 255, 255, 0.08);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    text-align: center;
    color: #fff;
    animation: fadeIn 1.2s ease;
}

/* Heading */
h1 {
    font-size: 28px;
    margin-bottom: 10px;
}

/* Paragraph */
p {
    font-size: 14px;
    opacity: 0.8;
    margin-bottom: 25px;
}

/* Button */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

/* Hover effect */
button:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(0, 114, 255, 0.5);
}

/* Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px);}
    to { opacity: 1; transform: translateY(0);}
}
</style>

</head>

<body>

<div class="container">
    <h1>Welcome 🚀</h1>
    <p>This is a premium UI design with glass effect and smooth animation.</p>
    <button onclick="showMessage()">Click Me</button>
</div>

<script>
function showMessage() {
    alert("🔥 Premium UI Activated!");
}
</script>

</body>
</html>
